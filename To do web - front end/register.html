<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create your account — Magadige Task</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<script>
  (function () {
    var ov = localStorage.getItem("magadige_theme_override");
    var h = new Date().getHours();
    var period = ov === "day" ? "afternoon" : ov === "night" ? "night" : (h >= 5 && h < 12 ? "morning" : h >= 12 && h < 17 ? "afternoon" : h >= 17 && h < 21 ? "evening" : "night");
    document.documentElement.setAttribute("data-theme", period === "night" ? "night" : "day");
    document.documentElement.setAttribute("data-period", period);
  })();
</script>
<link rel="stylesheet" href="css/variables.css" />
<link rel="stylesheet" href="css/base.css" />
<link rel="stylesheet" href="css/animations.css" />
<link rel="stylesheet" href="css/components.css" />
<link rel="stylesheet" href="css/pages/auth.css" />
</head>
<body>

<div class="theme-toggle auth-theme-toggle" data-theme-toggle>
  <button data-theme-set="day" data-tooltip="Day" data-tooltip-pos="bottom"><span id="toggleSunIcon"></span></button>
  <button data-theme-set="auto" data-tooltip="Auto" data-tooltip-pos="bottom"><span id="toggleAutoIcon"></span></button>
  <button data-theme-set="night" data-tooltip="Night" data-tooltip-pos="bottom"><span id="toggleMoonIcon"></span></button>
</div>

<div class="auth-shell">
  <section class="auth-visual has-photo auth-visual--register">
    <div class="auth-visual-bg auth-visual-bg-day"></div>
    <div class="auth-visual-bg auth-visual-bg-night"></div>
    <a href="index.html" class="flex items-center gap-2" style="color:#fff;">
      <div class="brand-mark" style="background:rgba(255,255,255,.16);box-shadow:none;">M</div>
      <span class="brand-name" style="color:#fff;">Magadige Task</span>
    </a>
    <div class="auth-visual-illustration"></div>
    <div class="auth-visual-quote">
      <p>The future belongs to those who believe in the beauty of their dreams.</p>
      <span>— Eleanor Roosevelt</span>
    </div>
  </section>

  <section class="auth-panel">
    <div class="auth-panel-inner anim-fade-up">
      <a href="index.html" class="auth-back">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6 9 12l6 6"/></svg>
        Back to home
      </a>
      <h1>Create your account</h1>
      <p class="lead">Start turning daily tasks into lifelong dreams — free forever.</p>

      <form class="auth-form" data-auth-form data-redirect="dashboard.html">
        <div class="avatar-upload">
          <div class="avatar-upload-circle" id="avatarCircle"><span id="cameraIcon"></span></div>
          <div>
            <label for="avatarInput" class="btn btn-secondary btn-sm">Upload photo</label>
            <input type="file" id="avatarInput" accept="image/*" class="visually-hidden" />
            <p class="field-hint" style="margin-top:4px;">Optional — PNG or JPG</p>
          </div>
        </div>

        <div class="field">
          <label class="field-label" for="regName">Full name</label>
          <div class="input-group">
            <span class="input-group-icon" id="userIcon"></span>
            <input class="input" type="text" id="regName" placeholder="Amaka Nwosu" required />
          </div>
          <span class="field-error" data-error-for="regName"></span>
        </div>

        <div class="field">
          <label class="field-label" for="regEmail">Email address</label>
          <div class="input-group">
            <span class="input-group-icon" id="mailIcon"></span>
            <input class="input" type="email" id="regEmail" placeholder="you@example.com" required />
          </div>
          <span class="field-error" data-error-for="regEmail"></span>
        </div>

        <div class="field">
          <label class="field-label" for="regPassword">Password</label>
          <div class="input-group">
            <span class="input-group-icon" id="lockIcon1"></span>
            <input class="input" type="password" id="regPassword" placeholder="Create a strong password" required />
            <span class="input-group-trailing"><button type="button" class="icon-btn password-toggle" style="width:32px;height:32px;border:none;" data-toggle-password="regPassword"></button></span>
          </div>
          <div class="pw-strength"><div class="pw-strength-bar"></div><div class="pw-strength-bar"></div><div class="pw-strength-bar"></div><div class="pw-strength-bar"></div></div>
          <span class="field-error" data-error-for="regPassword"></span>
        </div>

        <div class="field">
          <label class="field-label" for="regConfirm">Confirm password</label>
          <div class="input-group">
            <span class="input-group-icon" id="lockIcon2"></span>
            <input class="input" type="password" id="regConfirm" placeholder="Re-enter your password" required data-matches="regPassword" />
          </div>
          <span class="field-error" data-error-for="regConfirm"></span>
        </div>

        <label class="checkbox-row"><input type="checkbox" class="checkbox" required /> I agree to the <a href="#" style="color:var(--brand);font-weight:700;">Terms</a> &amp; <a href="#" style="color:var(--brand);font-weight:700;">Privacy Policy</a></label>

        <button type="submit" class="btn btn-primary btn-lg btn-block">Create account</button>
      </form>

      <div class="divider-label" style="margin:var(--sp-4) 0;">or sign up with</div>

      <button class="btn btn-secondary btn-block" id="googleBtn"><span id="googleIcon"></span> Continue with Google</button>

      <p class="auth-footnote">Already have an account? <a href="login.html">Log in</a></p>
    </div>
  </section>
</div>

<script src="js/icons.js"></script>
<script src="js/theme.js"></script>
<script src="js/seasonal.js"></script>
<script>
  document.getElementById("cameraIcon").innerHTML = ICON.camera;
  document.getElementById("userIcon").innerHTML = ICON.user;
  document.getElementById("mailIcon").innerHTML = ICON.mail;
  document.getElementById("lockIcon1").innerHTML = ICON.lock;
  document.getElementById("lockIcon2").innerHTML = ICON.lock;
  document.getElementById("googleIcon").innerHTML = ICON.google;
  document.getElementById("googleBtn").addEventListener("click", () => location.href = "dashboard.html");
  document.getElementById("toggleSunIcon").innerHTML = ICON.sun;
  document.getElementById("toggleAutoIcon").innerHTML = ICON.auto;
  document.getElementById("toggleMoonIcon").innerHTML = ICON.moon;
</script>
<script src="js/auth.js"></script>
</body>
</html>
